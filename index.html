<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оплата ВТБ</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #081a3a, #05060a);
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
}

/* верхний текст */
.top {
  position: absolute;
  top: 20px;
  font-size: 18px;
  opacity: 0.8;
  text-align: center;
}

/* карта */
.card {
  width: 340px;
  height: 210px;
  border-radius: 22px;
  background: linear-gradient(135deg, #0b57d0, #1e90ff);
  position: relative;
  padding: 20px;
  box-sizing: border-box;
  cursor: pointer;
  box-shadow: 0 25px 60px rgba(0,0,0,0.6);
  overflow: hidden;
}

/* волна */
.wave {
  position: absolute;
  width: 300%;
  height: 300%;
  background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 60%);
  top: -100%;
  left: -100%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { transform: scale(0.5); opacity: 0.6; }
  100% { transform: scale(1.5); opacity: 0; }
}

/* статус */
.status {
  position: absolute;
  bottom: 20px;
  left: 20px;
  font-size: 14px;
  opacity: 0.9;
}

/* NFC */
.nfc {
  position: absolute;
  bottom: 20px;
  right: 20px;
}

/* МИР */
.mir {
  position: absolute;
  bottom: 15px;
  left: 20px;
  font-size: 14px;
  opacity: 0.8;
}

/* успех */
.success {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #071a0f;
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.success h1 {
  color: #3dff8b;
}

/* логотип ВТБ */
.vtb {
  position: absolute;
  top: 12px;
  right: 15px;
}
</style>
</head>

<body>

<div class="top">Поднесите карту для оплаты</div>

<div class="card" onclick="pay()">
  <div class="wave"></div>

  <!-- ВТБ логотип -->
  <div class="vtb">
    <svg width="60" height="24" viewBox="0 0 120 40">
      <defs>
        <linearGradient id="g" x1="0" x2="1">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#bfe3ff"/>
        </linearGradient>
      </defs>

      <text x="0" y="30"
        font-size="28"
        font-weight="bold"
        fill="url(#g)"
        font-family="Arial, sans-serif">
        ВТБ
      </text>
    </svg>
  </div>

  <div class="status" id="status">ГОТОВО</div>
  <div class="nfc">📶 NFC</div>
  <div class="mir">МИР</div>
</div>

<div class="success" id="success">
  <h1>✔ Оплата прошла</h1>
  <p>Транзакция успешно завершена</p>
</div>

<script>
function pay() {
  const status = document.getElementById("status");
  const success = document.getElementById("success");

  status.innerText = "ОБРАБОТКА...";

  // вибрация
  if (navigator.vibrate) {
    navigator.vibrate(150);
  }

  setTimeout(() => {
    status.innerText = "ОДОБРЕНО ✔";
  }, 900);

  setTimeout(() => {
    document.querySelector(".card").style.display = "none";
    success.style.display = "flex";
  }, 1500);
}
</script>

</body>
</html>

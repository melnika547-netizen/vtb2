<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTB Pay Terminal</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at top, #0a0f2c, #05060a);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
}

.top {
  position: absolute;
  top: 25px;
  opacity: 0.8;
  font-size: 18px;
  text-align: center;
}

/* сцена */
.scene {
  perspective: 1000px;
}

/* 💳 карта */
.card {
  width: 340px;
  height: 210px;
  border-radius: 22px;
  background: linear-gradient(135deg, #0b57d0, #1e90ff);
  position: relative;
  padding: 20px;
  box-sizing: border-box;
  cursor: pointer;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  overflow: hidden;
  transform-style: preserve-3d;
  transition: transform 0.2s ease, opacity 0.4s ease;
}

/* ripple */
.ripple {
  position: absolute;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
  transform: scale(0);
  animation: ripple 0.6s linear;
}

@keyframes ripple {
  to {
    transform: scale(25);
    opacity: 0;
  }
}

/* ВТБ */
.vtb {
  position: absolute;
  top: 12px;
  right: 15px;
}

/* статус */
.status {
  position: absolute;
  top: 55px;
  left: 20px;
  font-size: 14px;
  font-weight: bold;
  letter-spacing: 1px;
}

/* NFC */
.nfc {
  position: absolute;
  bottom: 20px;
  right: 20px;
}

/* МИР */
.mir {
  position: absolute;
  bottom: 15px;
  left: 20px;
  font-size: 14px;
  opacity: 0.8;
}

/* 🌑 терминал фон */
.terminal-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, rgba(0,0,0,0.6), rgba(0,0,0,0.95));
  display: none;
  z-index: 5;
}

/* 💳 анимация ухода в терминал */
.card.pay-anim {
  animation: toTerminal 1.2s ease forwards;
  z-index: 10;
}

@keyframes toTerminal {
  0% {
    transform: scale(1);
    opacity: 1;
  }
  50% {
    transform: scale(0.6) translateY(30px);
  }
  100% {
    transform: scale(0.15) translateY(-250px);
    opacity: 0;
  }
}

/* 🌫 успех экран (по центру) */
.success {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  display: none;
  justify-content: center;
  align-items: center;

  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
}

.success-box {
  text-align: center;
  padding: 30px 40px;
  border-radius: 20px;
  background: rgba(20, 20, 30, 0.6);
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
}

.success-box h1 {
  color: #3dff8b;
  margin: 0;
}
</style>
</head>

<body>

<div class="top">Поднесите карту для оплаты</div>

<div class="scene">

  <div class="card" id="card"
       onmousemove="tilt(event)"
       onmouseleave="resetTilt()"
       onclick="pay(event)">

    <!-- ВТБ -->
    <div class="vtb">
      <svg width="60" height="24" viewBox="0 0 120 40">
        <defs>
          <linearGradient id="g" x1="0" x2="1">
            <stop offset="0%" stop-color="#fff"/>
            <stop offset="100%" stop-color="#bfe3ff"/>
          </linearGradient>
        </defs>
        <text x="0" y="30" font-size="28" font-weight="bold" fill="url(#g)">ВТБ</text>
      </svg>
    </div>

    <div class="status" id="status">ГОТОВО</div>
    <div class="nfc">📶 NFC</div>
    <div class="mir">МИР</div>

  </div>

</div>

<!-- терминал фон -->
<div class="terminal-bg" id="terminalBg"></div>

<!-- успех -->
<div class="success" id="success">
  <div class="success-box">
    <h1>✔ Оплата выполнена</h1>
    <p>Транзакция завершена</p>
  </div>
</div>

<script>

const card = document.getElementById("card");
const status = document.getElementById("status");
const success = document.getElementById("success");
const terminalBg = document.getElementById("terminalBg");

/* 3D tilt */
function tilt(e) {
  const rect = card.getBoundingClientRect();

  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const rotateX = ((y - rect.height / 2) / 10) * -1;
  const rotateY = (x - rect.width / 2) / 10;

  card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
}

function resetTilt() {
  card.style.transform = "rotateX(0deg) rotateY(0deg)";
}

/* 💸 оплата + терминал анимация */
function pay(e) {

  // ripple
  const ripple = document.createElement("span");
  ripple.classList.add("ripple");

  const rect = card.getBoundingClientRect();
  ripple.style.left = (e.clientX - rect.left) + "px";
  ripple.style.top = (e.clientY - rect.top) + "px";

  card.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);

  // вибрация
  if (navigator.vibrate) navigator.vibrate(120);

  status.innerText = "СВЯЗЬ С ТЕРМИНАЛОМ...";

  // затемнение
  terminalBg.style.display = "block";

  // старт анимации ухода карты
  setTimeout(() => {
    card.classList.add("pay-anim");
  }, 300);

  setTimeout(() => {
    status.innerText = "ОБРАБОТКА...";
  }, 700);

  setTimeout(() => {
    card.style.display = "none";
    terminalBg.style.display = "none";
    success.style.display = "flex";
  }, 1400);
}

</script>

</body>
</html>
